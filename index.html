<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Road Trip Islande — Accueil</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🇮🇸</text></svg>">
</head>
<body data-page="accueil">
  <main>
    <section class="hero">
      <div class="hero-text">
        <div class="eyebrow">03–17 juil. 2026 · Ísland</div>
        <h1 class="hero-h1">Tour de l'île<br><em>en 15 jours</em></h1>
        <p class="muted">Road trip autour de l'Islande — modèle « Around Iceland » de Hey Iceland, adapté à nos dates et enrichi (randos, glaciers du sud, baleines au nord).</p>
        <div class="hero-meta" id="hero-meta"></div>
      </div>
      <div class="hero-map" id="hero-map"></div>
    </section>

    <div id="today"></div>

    <div class="eyebrow" style="margin:1.4rem 0 .6rem">Carnet de route</div>
    <div class="tiles" id="tiles"></div>

    <div class="card" style="margin-top:1.4rem">
      <h2>Régions traversées</h2>
      <div class="region-chips" id="regions"></div>
    </div>
  </main>
  <script src="assets/data.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
