<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Réservations — Road Trip Islande</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🇮🇸</text></svg>">
</head>
<body data-page="reservations">
  <main>
    <h1 class="page-title">Réservations</h1>
    <p class="page-sub">Hôtels, excursions, vol, transport — état des réservations du voyage.</p>

    <div class="toolbar">
      <span class="status resa" id="resa-count">…</span>
      <span class="muted">Statuts :</span>
      <span class="status todo">à faire</span>
      <span class="status resa">réservé</span>
      <span class="status paye">payé</span>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th style="width:110px">Type</th><th>Libellé</th><th style="width:120px">Date</th><th style="width:140px">N° confirmation</th><th style="width:110px">Statut</th></tr>
          </thead>
          <tbody id="resa-body"></tbody>
        </table>
      </div>
    </div>
    <p class="muted">L'état est fixé dans <code>assets/data.js</code>. Préviens-moi quand tu réserves quelque chose, je mets à jour.</p>
  </main>
  <script src="assets/data.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
