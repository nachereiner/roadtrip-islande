<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dépenses — Road Trip Islande</title>
  <link rel="stylesheet" href="assets/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>🇮🇸</text></svg>">
</head>
<body data-page="depenses">
  <main>
    <h1 class="page-title">Dépenses</h1>
    <p class="page-sub">Estimation des coûts du voyage (vol, voiture, hébergements). Montants en euros.</p>

    <div class="card exp-chart" id="dep-chart"></div>

    <div class="card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr><th style="width:110px">Date</th><th style="width:150px">Catégorie</th><th>Libellé</th><th class="num" style="width:120px">Montant</th></tr>
          </thead>
          <tbody id="dep-body"></tbody>
          <tfoot>
            <tr><td colspan="3">Total</td><td class="num" id="dep-total">—</td></tr>
          </tfoot>
        </table>
      </div>
    </div>
    <p class="muted">Les montants sont fixés dans <code>assets/data.js</code>. Pour les modifier, édite ce fichier.</p>
  </main>
  <script src="assets/data.js"></script>
  <script src="assets/app.js"></script>
</body>
</html>
